<!DOCTYPE html>
<html lang="en">
<head>
  <title>Mesh Graph Viewer</title>
  <meta charset="utf-8">
  <!-- theme can be easily customized via css -->
  <link href="netjsongraph-theme.css" rel="stylesheet">
  <link href="netjsongraph.css" rel="stylesheet">
  <link href="leaflet-draw.css" rel="stylesheet">
  <link href="leaflet.css" rel="stylesheet">
    <style type="text/css">
    .njg-metadata {
      left: 50px;
    }
    /*
    .leaflet-control {
      margin: buttom-
    }*/
    .njg-selectIcon {
      top: 100px;
    }
  </style>
  <script type="text/javascript" src="netjsongraph.min.js"></script>
  <script type="text/javascript">

  /*
  function $(selector) {
    return document.querySelector(selector);
  }
  */

  //from jx_compressed.js
  let jx={getHTTPObject:function(){var A=false;if (typeof ActiveXObject!='undefined'){try{A=new ActiveXObject('Msxml2.XMLHTTP')}catch(C){try{A=new ActiveXObject('Microsoft.XMLHTTP')}catch(B){A=false}}}else{if (window.XMLHttpRequest){try{A=new XMLHttpRequest()}catch(C){A=false}}}return A},load:function(url,callback,format){var http=this.init();if (!http||!url){return }if (!format){var format='text'}format=format.toLowerCase();var now='uid='+new Date().getTime();url+=(url.indexOf('?')+1)?'&':'?';url+=now;http.open('GET',url,true);http.onreadystatechange=function(){if (http.readyState==4){if (http.status==200){var result='';if (http.responseText){result=http.responseText}if (format.charAt(0)=='j'){result=result.replace(/[\n\r]/g,'');result=eval('('+result+')')}if (callback){callback(result)}}else{alert("Connection Lost")}}};http.send(null)},init:function(){return this.getHTTPObject()}}


  function params(obj) {
    var str = '';
    for (var key in obj) {
      if (str.length) str += '&';
      else str += '?';
      str += encodeURIComponent(key) + '=' + encodeURIComponent(obj[key]);
    }
    return str.replace(/%20/g, '+');
  }

  function send(url, obj, func) {
    url += params(obj);
    jx.load(url, func, 'text');
  }

  const LinkStyle = {
    wireless: {
      color: "#669999",
    },
    wireless_weak: {
      color: "#ccccff",
    },
    ethernet: {
      color: "#00ff00",
      opacity: 0.7,
    },
    fiber: {
      color: "#1f77b4",
    },
    vpn: {
      color: "purple",
    }
  };

  let netjson_options = {
    el: "NetJSONContainer",
    edgeLength: 300,
    nodeSize: 30,
    graphConfig: {
        force: {
            gravity: 0.1,
            edgeLength: [80, 100],
            repulsion: 2000
        },
    },
    linkStyleProperty: link => {
        return Object.assign({
            width: 10,
            opacity: 0.5,
        }, LinkStyle[link.properties.type] || { color: "purple" })
    },
    nodeStyleProperty: e => {
      let customStyle = {};
      
      // Define gradient color of nodes.
      if(e.properties.gateway){
        customStyle = {
          color: {
              type: 'radial',
              x: 0.5,
              y: 0.5,
              r: 0.5,
              colorStops: [{
                  offset: 0, color: '#f18d3a'
              }, {
                  offset: 0.7, color: '#f18d3a'
              }, {
                  offset: 0.71, color: '#f8c69d'
              }, {
                  offset: 1, color: '#f8c69d',
              }],
              global: false
          }
        }
      }
      return Object.assign({
        color: {
            type: 'radial',
            x: 0.5,
            y: 0.5,
            r: 0.5,
            colorStops: [{
                offset: 0, color: '#3d83b5'
            }, {
                offset: 0.7, color: '#3d83b5'
            }, {
                offset: 0.71, color: '#9ec1da'
            }, {
                offset: 1, color: '#9ec1da',
            }],
            global: false
        }
      }, customStyle);
    },


   // render: "map",
      mapNodeConfig: {
          label: {
              color: "white",
              offset: [0, -10],
          }
      },
      // set multiple tiles config, can change them dynamically.
      mapTileConfig: [{
          label: "Blue Street",
          urlTemplate: "http://map.geoq.cn/ArcGIS/rest/services/ChinaOnlineStreetPurplishBlue/MapServer/tile/{z}/{y}/{x}",
          options: {
              minZoom: 0.25, 
              maxZoom: 18,
          }
      }, {
          label: "Open Street Map",
          urlTemplate: "https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png",
          options: {}
      }],
      // set map initial state.
      mapOptions: {
          center: [46.86764405052012, 19.675998687744144],
          zoom: 6,
      },
      // Convert to internal json format
      prepareData: data => {
          data.nodes.map(node => {
              node.label = node.name;
              node.properties = Object.assign(node.properties || {}, {
                  location: node.location,
              })
          })
      },

      onLoad: function(){
          switchGraphMode(this);
          this.utils.hideLoading();
      }
  };

    /**
     * @function
     * @name switchGraphMode
     * Add viewEye icon to change graph or map mode.
     * 
     * @param {object} _this  NetJSONGraph object
     *
     * @return {object} selectIconContainer DOM
     */
    function switchGraphMode(_this){
            let selectIconContainer = document.createElement("div"),
                iconEye = document.createElement("span");
            iconEye.setAttribute("class", "iconfont icon-eye");
            selectIconContainer.setAttribute("class", "njg-selectIcon");
            selectIconContainer.appendChild(iconEye);
            _this.el.appendChild(selectIconContainer);

            iconEye.onclick = () => {
                if(_this.config.render === _this.utils.mapRender){
                    _this.config.render = _this.utils.graphRender;
                    // Poor performance, not recommended.
                    // reDraw
                    _this.echarts.dispose();
                    const graph = new NetJSONGraph(_this.data, {
                        ..._this.config,
                        el: _this.el,
                    });
                    graph.render();
                }
                else{
                    _this.config.render = _this.utils.mapRender;
                    _this.config.render(_this.data, _this);
                }
            }

            return selectIconContainer;
        }

  function init() {
      const graph = new NetJSONGraph("dummy.json", netjson_options);
      graph.render();

      function handle_data(data) {
        try {
          let jd = JSON.parse(data);
          if (!jd.nodes && !jd.links) {
            return
          }
          console.log("handle_data: " + data);

          // make sure input is valid
          if (!('nodes' in jd)) {
            jd['nodes'] = []
          }

          if (!('links' in jd)) {
            jd['links'] = []
          }

          graph.utils.JSONDataUpdate.call(graph, jd)
        } catch (e) {
          alert(e);
          console.log(e);
          return;
        }
    }

    // fetch graph update
    function run_graph_update_loop() {
      var interval_ms = 250;

      function looped_request_graph() {
        // request graph
        send("/cmd/graph", {}, function(data) {
          handle_data(data);
          setTimeout(looped_request_graph, interval_ms);
        });
      }

      looped_request_graph();
    }

    run_graph_update_loop();
  }
  </script>
</head>
<body onload="init();">
  <div id="legend">
      <p><span class="circle node">&nbsp;</span> ordinary node</p>
      <p><span class="circle gateway">&nbsp;</span> gateway node</p>
      <p><span class="link wireless">&nbsp;</span> wireless link</p>
      <p><span class="link wireless_weak">&nbsp;</span> weak wireless link</p>
      <p><span class="link ethernet">&nbsp;</span> ethernet link</p>
      <p><span class="link fiber">&nbsp;</span> fiber link</p>
      <p><span class="link vpn">&nbsp;</span> vpn link</p>
  </div>
  <div id="NetJSONContainer"></div>
</body>
</html>
