  //from jx_compressed.js
  let jx={getHTTPObject:function(){var A=false;if (typeof ActiveXObject!='undefined'){try{A=new ActiveXObject('Msxml2.XMLHTTP')}catch(C){try{A=new ActiveXObject('Microsoft.XMLHTTP')}catch(B){A=false}}}else{if (window.XMLHttpRequest){try{A=new XMLHttpRequest()}catch(C){A=false}}}return A},load:function(url,callback,format){var http=this.init();if (!http||!url){return }if (!format){var format='text'}format=format.toLowerCase();var now='uid='+new Date().getTime();url+=(url.indexOf('?')+1)?'&':'?';url+=now;http.open('GET',url,true);http.onreadystatechange=function(){if (http.readyState==4){if (http.status==200){var result='';if (http.responseText){result=http.responseText}if (format.charAt(0)=='j'){result=result.replace(/[\n\r]/g,'');result=eval('('+result+')')}if (callback){callback(result)}}else{alert("Connection Lost")}}};http.send(null)},init:function(){return this.getHTTPObject()}}


  function params(obj) {
    var str = '';
    for (var key in obj) {
      if (str.length) str += '&';
      else str += '?';
      str += encodeURIComponent(key) + '=' + encodeURIComponent(obj[key]);
    }
    return str.replace(/%20/g, '+');
  }

  function send(url, obj, func) {
    url += params(obj);
    jx.load(url, func, 'text');
  }

  	let netjson_options = {
        render: "map",
        switchMode: true,
        // set map initial state.
        mapOptions: {
          center: [46.86764405052012, 19.675998687744144],
          zoom: 5,
          nodeConfig: {
            label: {
              offset: [0, -10],
            },
          },
        },
        // Convert to internal json format
        prepareData: (data) => {
          data.nodes.map((node) => {
            node.label = node.name;
            node.properties = Object.assign(node.properties || {}, {
              location: node.location,
            });
          });
        },
      };

  function init() {
      const graph = new NetJSONGraph({nodes: [], links: []}, netjson_options);
      graph.render();

      function handle_data(data) {
        try {
          let jd = JSON.parse(data);
          if (!jd.nodes && !jd.links) {
            return
          }
          console.log("handle_data: " + data);

          // make sure input is valid
          if (!('nodes' in jd)) {
            jd['nodes'] = []
          }

          if (!('links' in jd)) {
            jd['links'] = []
          }

          graph.utils.JSONDataUpdate.call(graph, jd)
        } catch (e) {
          alert(e);
          console.log(e);
          return;
        }
    }

    // fetch graph update
    function run_graph_update_loop() {
    console.log("run_graph_update_loop");
      var interval_ms = 500;

      function looped_request_graph() {
      	console.log("looped_request_graph");
        // request graph
        send("/cmd/graph", {}, function(data) {
          handle_data(data);
          setTimeout(looped_request_graph, interval_ms);
        });
      };

      looped_request_graph();
    }

    run_graph_update_loop();
  }
  </script>
</head>
<body onload="init();">
